name: Matcherino EMEA Bot

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:        # bouton pour lancer manuellement

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Lancer le bot
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python bot_matcherino.py

      - name: Sauvegarder les tournois vus
        run: |
          git config user.name "Matcherino Bot"
          git config user.email "bot@github.com"
          git add tournois_vus.json
          git diff --cached --quiet || git commit -m "Update tournois vus [skip ci]"
          git push
